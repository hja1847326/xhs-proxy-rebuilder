server:
  provider: huaweicloud
  region: cn-east-3
  hostname: ecs-99bc
  os: centos7
  public_ip: 116.63.32.67

resources:
  egresses:
    - id: main
      bind_ip: 192.168.0.10
      expected_public_ip: ""
      kind: primary
      note: 主IP出口（已在新机只读检查中确认）

    - id: vip1
      bind_ip: 192.168.0.11
      expected_public_ip: ""
      kind: vip
